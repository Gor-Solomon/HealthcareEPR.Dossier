name: Continuous Deployment (Vercel)

on:
  push:
    branches:
      - master

jobs:
  deploy-frontend:
    name: Deploy Next.js to Vercel
    runs-on: ubuntu-latest
    
    # THIS SECTION IS CRITICAL BECAUSE YOUR CODE IS IN A SUBFOLDER
    defaults:
      run:
        working-directory: ./HealthcareEPR.Dossier.Web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      # ADD THIS STEP BELOW TO KILL THE ZOMBIE FOLDER
      - name: Clean Vercel Cache
        run: |
          rm -rf .vercel
          rm -rf ./HealthcareEPR.Dossier.Web/.vercel
          rm -rf ../.vercel    

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}